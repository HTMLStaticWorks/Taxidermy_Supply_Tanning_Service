<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Heritage | Taxidermy Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
</head>
<body class="auth-page" data-theme="dark">

    <div class="auth-controls">
        <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
            <i class="bi bi-sun"></i>
        </button>
        <button class="rtl-toggle" id="rtl-toggle" title="Toggle RTL">
            <i class="bi bi-arrow-left-right"></i>
        </button>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card reveal">
            <div class="text-center mb-5">
                <a href="index.html" class="footer-logo d-block mb-2"><img src="assets/images/logo.svg" alt="Logo" class="me-2" style="height: 30px;">VESTIGE</a>
                <p class="text-muted small text-uppercase letter-spacing-1">Join the Professional Community</p>
            </div>
            
            <form>
                <div class="row g-4">
                    <div class="col-12">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" placeholder="Jane">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" placeholder="Doe">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="jane@example.com">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Password</label>
                        <div class="password-group position-relative">
                            <input type="password" class="form-control pe-5" id="regPassword" placeholder="••••••••">
                            <button type="button" class="password-toggle position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent p-0 me-3 d-flex align-items-center justify-content-center" onclick="togglePassword('regPassword', this)" style="width: 1.5rem; height: 1.5rem; line-height: 1;">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="terms">
                            <label class="form-check-label small text-muted" for="terms">I agree to the <a href="#" class="text-tan fw-bold">Terms of Service</a> and <a href="#" class="text-tan fw-bold">Privacy Policy</a></label>
                        </div>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn-premium w-100">Create Account</button>
                    </div>
                </div>

                <div class="social-login-divider small text-uppercase letter-spacing-1">Or Sign Up With</div>
                
                <div class="social-btns">
                    <a href="#" class="btn-social">
                        <i class="bi bi-google text-danger"></i>
                        Google
                    </a>
                    <a href="#" class="btn-social">
                        <i class="bi bi-apple"></i>
                        Apple
                    </a>
                </div>
            </form>
            
            <div class="text-center mt-5">
                <p class="small text-muted">Already a member? <a href="login.html" class="text-tan fw-bold">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
